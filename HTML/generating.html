<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גיבורים קטנים — יוצרים את הספר שלכם</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/main.css" />
  <link rel="stylesheet" href="../CSS/generating.css" />
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────────── -->
  <header class="navbar">
    <div class="wrap">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <div class="logo-icon-sq"></div>
          <div class="logo-icon-dot"></div>
        </div>
        <div class="logo-text">
          <span class="logo-brand">גיבורים קטנים</span>
          <span class="logo-tagline">סיפורי חוסן לילדים</span>
        </div>
      </a>
      <a href="index.html" class="nav-cta">אני רוצה לנסות</a>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────────────────── -->
  <main class="gen-main">
    <div class="gen-content">

      <h1 class="gen-headline">
        <span class="gen-sparkle">✨</span> אנחנו מתחילים ליצור עכשיו את הספר <span class="gen-bold">שלכם</span>
      </h1>

      <!-- Percentage -->
      <div class="gen-pct" id="genPct">0%</div>

      <!-- Progress bar (fills right-to-left for RTL) -->
      <div class="gen-bar-track">
        <div class="gen-bar-fill" id="genBarFill" style="width:0%"></div>
      </div>

      <!-- Step labels (RTL: rightmost = first) -->
      <div class="gen-steps">
        <div class="gen-step" id="step-0">יצירת הטקסט</div>
        <div class="gen-step" id="step-1">יצירת תמונות</div>
        <div class="gen-step" id="step-2">קריינות</div>
        <div class="gen-step" id="step-3">דיוקים אחרונים</div>
      </div>

      <!-- Status text -->
      <p class="gen-status-text" id="genStatusText"></p>

    </div>
  </main>

  <script>
    const STAGES = [
      { pct: 8,   step: 0, text: 'כותבים ספר שמותאם בדיוק לכם' },
      { pct: 25,  step: 0, text: 'כותבים את פרקי הסיפור שלכם' },
      { pct: 38,  step: 1, text: 'יוצרים עולם קסום עם איורים' },
      { pct: 55,  step: 1, text: 'מציירים כל עמוד בספר' },
      { pct: 69,  step: 2, text: 'מכינים הקראה נעימה בעברית' },
      { pct: 82,  step: 2, text: 'מסיימים את ההקראה שלכם' },
      { pct: 91,  step: 3, text: 'מסדרים את הספר שלכם' },
      { pct: 100, step: 3, text: '' },
    ];

    let stageIdx = 0;

    const barFill  = document.getElementById('genBarFill');
    const pctEl    = document.getElementById('genPct');
    const statusEl = document.getElementById('genStatusText');
    const stepEls  = [0,1,2,3].map(i => document.getElementById('step-' + i));

    function setProgress(pct, step, text) {
      barFill.style.width = pct + '%';
      pctEl.textContent   = pct + '%';
      statusEl.textContent = text;
      statusEl.style.animation = 'none';
      statusEl.offsetHeight;
      statusEl.style.animation = '';

      stepEls.forEach((el, i) => {
        el.classList.remove('active', 'done');
        if (i < step)  el.classList.add('done');
        if (i === step) el.classList.add('active');
      });
    }

    function advance() {
      if (stageIdx >= STAGES.length) return;
      const s = STAGES[stageIdx++];
      setProgress(s.pct, s.step, s.text);

      if (s.pct >= 100) {
        setTimeout(() => { window.location.href = 'ready.html'; }, 1600);
        return;
      }
      setTimeout(advance, 3000 + Math.random() * 3500);
    }

    setTimeout(advance, 600);
  </script>

</body>
</html>
