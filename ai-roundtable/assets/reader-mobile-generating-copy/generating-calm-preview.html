<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generating calm preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../public/CSS/main.css" />
  <link rel="stylesheet" href="../../../public/CSS/generating.css" />
  <style>
    body { margin: 0; }
    .preview-label {
      position: fixed;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: #888;
      z-index: 9;
    }
  </style>
</head>
<body>
  <p class="preview-label">generating · mobile 390px · no progress bar</p>
  <header class="navbar">
    <div class="wrap">
      <a href="/" class="logo">
        <div class="logo-icon">
          <div class="logo-icon-sq"></div>
          <div class="logo-icon-dot"></div>
        </div>
        <div class="logo-text">
          <span class="logo-brand">גיבורים קטנים</span>
          <span class="logo-tagline">ספרים אישיים לילדים</span>
        </div>
      </a>
    </div>
  </header>
  <main class="gen-main" id="capture">
    <div class="gen-content">
      <h1 class="gen-headline">אנחנו מכינים את הספר של נועה ✨</h1>
      <div class="gen-hero" aria-hidden="true">
        <div class="gen-hero-orbit">
          <span class="gen-hero-sparkle gen-hero-sparkle--a">✨</span>
          <span class="gen-hero-sparkle gen-hero-sparkle--b">✨</span>
          <span class="gen-hero-sparkle gen-hero-sparkle--c">✨</span>
          <div class="gen-hero-book">
            <div class="gen-hero-book-pages"></div>
            <div class="gen-hero-book-cover"></div>
          </div>
        </div>
      </div>
      <p class="gen-body">ההכנה לוקחת זמן. אפשר לסגור את החלון — נשלח לכם <strong>אימייל עם לינק לספר</strong> ברגע שהוא מוכן.</p>
    </div>
  </main>
</body>
</html>
