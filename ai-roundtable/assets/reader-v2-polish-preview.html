<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReaderV2 polish preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Heebo, Arial, sans-serif; background: #111; }
    .frame { position: relative; overflow: hidden; background: #1f1a17; }
    .frame.mobile { width: 390px; height: 844px; }
    .frame.desktop { width: 1280px; height: 800px; display: flex; align-items: center; justify-content: center; }
    .cover {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #6b8fd4 0%, #d4a574 55%, #8fbc8f 100%);
    }
    .cover.desktop-cover {
      width: 360px;
      height: 540px;
      border-radius: 3px;
      box-shadow: 0 12px 36px rgba(0,0,0,.32);
    }
    .cover-gradient {
      position: absolute; top: 0; left: 0; right: 0; height: 140px;
      background: linear-gradient(to bottom, rgba(20,15,10,.38), rgba(20,15,10,0));
    }
    .cover-title {
      position: absolute; top: 48px; left: 0; right: 0; text-align: center;
      color: #fff9f0; font-size: 18px; line-height: 1.2; text-shadow: 0 2px 14px rgba(0,0,0,.55);
      padding: 0 32px;
    }
    .desktop .cover-title { font-size: 20px; }
    .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 999px;
      background: rgba(38,30,24,.78); color: rgba(255,248,235,.9);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .nav.prev { left: calc(50% - 220px); }
    .nav.next { right: calc(50% - 220px); }
    .text-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 32px 56px;
      background: linear-gradient(to top, rgba(20,14,8,.58) 0%, rgba(20,14,8,.28) 34%, rgba(20,14,8,0) 82%);
      color: #fff; text-align: right; font-size: 21px; line-height: 1.6;
    }
    .edge {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 96px; display: flex; align-items: center; justify-content: center;
      background: rgba(20,14,8,.06); color: rgba(255,248,235,.38); font-size: 40px;
    }
    .edge.left { left: 0; border-radius: 0 12px 12px 0; }
    .edge.right { right: 0; border-radius: 12px 0 0 12px; }
    .label { position: absolute; top: 8px; left: 8px; color: #fff8; font-size: 11px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const mode = new URLSearchParams(location.search).get('mode') || 'mobile';
    const root = document.getElementById('root');
    const frame = document.createElement('div');
    frame.className = 'frame ' + mode;
    if (mode === 'mobile') {
      frame.innerHTML = `
        <div class="label">mobile · 390×844</div>
        <div class="cover">
          <div class="cover-gradient"></div>
          <div class="cover-title">האריה שירה לפני השינה</div>
          <div class="text-overlay">האריה הקטן פתח את העיניים וחייך אל אמא שלו.</div>
          <div class="edge left">‹</div>
          <div class="edge right">›</div>
        </div>`;
    } else {
      frame.innerHTML = `
        <div class="label">desktop · cover + RTL nav</div>
        <div class="nav prev">‹</div>
        <div class="cover desktop-cover">
          <div class="cover-gradient"></div>
          <div class="cover-title">האריה שירה לפני השינה</div>
        </div>
        <div class="nav next">›</div>`;
    }
    root.appendChild(frame);
  </script>
</body>
</html>
