<!DOCTYPE html>
<html dir="rtl" lang="he" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
  <title>{{HEADLINE}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style type="text/css">
    #outlook a { padding: 0; }
    body { margin: 0; padding: 0; width: 100% !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    @media only screen and (max-width: 620px) {
      .email-shell { width: 100% !important; }
      .email-card-pad { padding: 28px 20px 32px !important; }
      .otp-code { font-size: 30px !important; letter-spacing: 6px !important; }
      .brand-name { font-size: 22px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f7f6fb;font-family:'Heebo',Arial,Helvetica,sans-serif;">
  <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
    {{PREHEADER}}
  </div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f7f6fb;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" class="email-shell" width="560" cellspacing="0" cellpadding="0" border="0" style="width:560px;max-width:560px;">
          <!-- Brand yellow top strip -->
          <tr>
            <td style="height:8px;line-height:8px;font-size:8px;background-color:#ffee6c;border-radius:16px 16px 0 0;">&nbsp;</td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;border-radius:0 0 16px 16px;box-shadow:0 8px 28px rgba(132,103,255,0.12);">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td class="email-card-pad" style="padding:32px 36px 36px;">
                    <!-- Logo mark -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 auto 24px;">
                      <tr>
                        <td style="padding-left:12px;vertical-align:middle;">
                          <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="44" height="44" style="width:44px;height:44px;">
                            <tr>
                              <td width="44" height="44" style="width:44px;height:44px;background-color:#8467ff;border-radius:12px;position:relative;">
                                <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="right" style="margin-top:8px;margin-left:8px;">
                                  <tr>
                                    <td width="20" height="20" style="width:20px;height:20px;background-color:#ffee6c;border-radius:6px;font-size:0;line-height:0;">&nbsp;</td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                          </table>
                        </td>
                        <td style="vertical-align:middle;text-align:right;">
                          <div class="brand-name" style="font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;line-height:1.2;color:#18171a;">{{BRAND}}</div>
                          <div style="font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:13px;line-height:1.3;color:#6f6a80;margin-top:2px;">{{TAGLINE}}</div>
                        </td>
                      </tr>
                    </table>
                    <!-- Body -->
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td align="center" style="text-align:center;">
                          <h1 style="margin:0 0 10px;font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;line-height:1.35;color:#18171a;">{{HEADLINE}}</h1>
                          <p style="margin:0 0 22px;font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:16px;line-height:1.6;color:#5f5a70;">{{INSTRUCTION}}</p>
                        </td>
                      </tr>
                      <tr>
                        <td align="center" style="padding:0 0 24px;">
                          <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                            <tr>
                              <td class="otp-code" dir="ltr" style="background-color:#ede8ff;border-radius:14px;padding:16px 28px;font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;letter-spacing:8px;line-height:1.2;color:#8467ff;text-align:center;">{{CODE}}</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td align="center" style="text-align:center;">
                          <p style="margin:0;font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:14px;line-height:1.65;color:#6f6a80;">
                            <span style="display:inline-block;">{{TTL_NOTE}}</span>
                            <span style="display:inline-block;margin:0 6px;color:#c8c3d8;">|</span>
                            <span style="display:inline-block;">{{IGNORE_NOTE}}</span>
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 8px 0;text-align:center;font-family:'Heebo',Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;color:#9692aa;">
              {{BRAND}}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
