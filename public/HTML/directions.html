<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בחירת כיוון הסיפור — גיבורים קטנים</title>
  <meta name="description" content="בחרו את הכיוון הטיפולי לספר הילדים שלכם. גיבורים קטנים — ספרי חוסן רגשי מותאמים אישית." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='4' width='24' height='24' rx='6' fill='%237c5cfc'/><circle cx='20' cy='12' r='4' fill='%23ffd166'/></svg>" />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/main.css" />
  <link rel="stylesheet" href="../CSS/directions.css" />
</head>
<body>
<script src="/JS/gate.js"></script>
  <header class="navbar">
    <div class="wrap">
      <a href="/" class="logo">
        <div class="logo-icon">
          <div class="logo-icon-sq"></div>
          <div class="logo-icon-dot"></div>
        </div>
        <div class="logo-text">
          <span class="logo-brand" id="navBrand"></span>
          <span class="logo-tagline" id="navTagline"></span>
        </div>
      </a>
      <a href="/wizard" class="nav-cta" id="navCta"></a>
    </div>
  </header>

  <main class="directions-main">
    <div class="directions-wrap" id="directionsRoot" data-state="loading">
      <section class="directions-hero">
        <h1 id="directionsTitle"></h1>
        <p id="directionsSubtitle"></p>
      </section>

      <section id="directionsLoading" class="directions-loading">
        <div class="directions-loading-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <h2 id="directionsLoadingTitle" class="directions-loading-title"></h2>
        <p id="directionsLoadingHint" class="directions-loading-hint"></p>
        <div class="directions-indeterminate-track" aria-hidden="true">
          <div class="directions-indeterminate-fill"></div>
        </div>
      </section>

      <section id="directionsTransition" class="directions-loading" hidden>
        <div class="directions-loading-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <h2 id="directionsTransitionTitle" class="directions-loading-title"></h2>
        <p id="directionsTransitionHint" class="directions-loading-hint"></p>
      </section>

      <section id="directionsError" class="directions-error" hidden>
        <h2 id="directionsErrorTitle"></h2>
        <p id="directionsErrorMessage"></p>
        <button id="directionsRetryBtn" type="button" class="btn-outline"></button>
      </section>

      <section id="directionsGrid" class="directions-grid" hidden></section>
      <p id="directionsCheckoutError" class="directions-checkout-err" hidden></p>
    </div>
  </main>

  <script src="../JS/content.js"></script>
  <script src="../JS/routes.js"></script>
  <script src="../JS/analytics.js"></script>
  <script src="../JS/client-api.js"></script>
  <script src="../JS/directions.js"></script>
</body>
</html>
