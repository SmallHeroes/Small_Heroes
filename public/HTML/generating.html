<script src="/JS/gate.js"></script>



  <header class="navbar">

    <div class="wrap">

      <a href="/" class="logo">

        <div class="logo-icon">

          <div class="logo-icon-sq"></div>

          <div class="logo-icon-dot"></div>

        </div>

        <div class="logo-text">

          <span class="logo-brand" id="navBrand"></span>

    </div>

  <main class="gen-main">

    <div class="gen-content">



      <div id="genProgressArea">



        <h1 class="gen-headline" id="genHeadlineText"></h1>



        <div class="gen-hero" aria-hidden="true">

          <div class="gen-hero-orbit">

            <span class="gen-hero-sparkle gen-hero-sparkle--a">✨</span>

        </div>

      </div>



      <div class="gen-error-state" id="genErrorState" hidden>

        <div class="gen-error-msg" id="genErrorMsg"></div>
