<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גיבורים קטנים – יצירת ספר</title>
  <meta name="description" content="צרו ספר ילדים מותאם אישית — בחרו נושא, דמות מלווה, סגנון איור, ותנו ל-AI ליצור סיפור מיוחד." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='4' width='24' height='24' rx='6' fill='%237c5cfc'/><circle cx='20' cy='12' r='4' fill='%23ffd166'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/CSS/main.css" />
  <link rel="stylesheet" href="/CSS/wizard.css" />
</head>

<body class="wizard-body wizard-booting">
<script src="/JS/gate.js"></script>

  <nav class="navbar">
    <div class="wrap">
      <a class="logo" href="/">
        <div class="logo-icon">
          <div class="logo-icon-sq"></div>
          <div class="logo-icon-dot"></div>
        </div>
        <div class="logo-text">
          <span class="logo-brand" id="wizNavBrand"></span>
          <span class="logo-tagline" id="wizNavTagline"></span>
        </div>
      </a>
      <button class="nav-cta" id="wizNavCta" onclick="location.href='/'"></button>
    </div>
  </nav>

  <div id="progress-wrap">
    <div class="progress-card">
      <span class="progress-label" id="progress-label"></span>
      <div class="progress-pills" id="progress-pills"></div>
    </div>
  </div>

  <main class="wizard-main">

    <!-- ── Step 1 — Topic ────────────────────────────────────── -->
    <div class="step" id="step-1">
      <h2 class="step-title" id="s2Title"></h2>
      <p class="step-sub" id="s2Sub"></p>
      <div style="height:30px;"></div>
      <div class="chips-wrap" id="topic-chips"></div>
    </div>

    <!-- ── Step 2 — Companion character ──────────────────────── -->
    <div class="step" id="step-2">
      <p class="step-microcopy" id="companionMicro"></p>
      <h1 class="companion-h1" id="companionTitle"></h1>
      <p class="step-sub" id="companionSub"></p>
      <div class="companion-grid" id="companion-cards" role="group" aria-label="בחירת דמות מלווה"></div>
    </div>

    <!-- ── Step 3 — Child details ────────────────────────────── -->
    <div class="step step--child" id="step-3">
      <p class="step-microcopy" id="childMicro"></p>
      <h2 class="step-title" id="s3Title"></h2>
      <p class="step-sub step-sub--tight" id="s3Sub"></p>

      <div class="s3-card">
        <div class="form-side">
          <div class="form-group">
            <label class="form-label" id="s3NameLabel"></label>
            <input class="form-input" id="child-name" type="text" placeholder="" maxlength="30" autocomplete="off" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" id="s3AgeLabel"></label>
              <div class="select-wrap">
                <select class="form-select" id="child-age">
                  <option value=""></option>
                  <option>2</option>
                  <option>3</option>
                  <option>4</option>
                  <option>5</option>
                  <option>6</option>
                  <option>7</option>
                  <option>8</option>
                  <option>9</option>
                  <option>10</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" id="s3GenderLabel"></label>
              <div class="select-wrap">
                <select class="form-select" id="child-gender">
                  <option value=""></option>
                  <option value="boy"   id="s3GenderOptBoy"></option>
                  <option value="girl"  id="s3GenderOptGirl"></option>
                  <option value="other" id="s3GenderOptOther"></option>
                </select>
              </div>
            </div>
          </div>

        </div>

        <div class="photo-side">
          <p class="photo-hero-title" id="photo-hero-title" hidden>זו התמונה שתהפוך לגיבור הסיפור</p>
          <div class="photo-upload-area" id="photo-area">
            <div class="photo-plus">+</div>
            <div class="photo-txt">
              <span id="s3PhotoPrompt"></span>
              <small id="s3PhotoOptional"></small>
            </div>
          </div>
          <input type="file" id="photo-input" accept="image/jpeg,image/png,image/webp" onchange="handlePhoto(event)" />
          <p class="photo-reupload-hint" id="photo-reupload-hint" hidden role="status">
            לאחר רענון הדף יש להעלות את תמונת הילד/ה מחדש.
          </p>
        </div>
      </div>

      <div id="photo-quality-message" class="photo-quality-callout" role="status" aria-live="polite"></div>
    </div>

    <!-- ── Step 4 — Hero notes (optional) ────────────────────── -->
    <div class="step step--hero-notes" id="step-4">
      <p class="step-microcopy" id="heroNotesMicro"></p>
      <h2 class="step-title" id="heroNotesTitle"></h2>
      <p class="step-sub" id="heroNotesSub"></p>
      <div class="hero-notes-block">
        <p class="hero-notes-q" id="heroNotesStrengthQ"></p>
        <div class="trait-chips-wrap" id="hero-superpower-chips"></div>
      </div>
      <div class="hero-notes-block">
        <p class="hero-notes-q" id="heroNotesFeelingQ"></p>
        <div class="chips-wrap" id="hero-goals-chips"></div>
      </div>
      <button type="button" class="hero-notes-skip" onclick="goNext()">אפשר להמשיך גם בלי זה</button>
    </div>

    <!-- ── Step 5 — Style ──────────────────────────────────── -->
    <div class="step" id="step-5">
      <p class="step-microcopy" id="styleMicro"></p>
      <h2 class="step-title" id="sStyleTitle"></h2>
      <p class="step-sub" id="sStyleSub"></p>
      <div class="style-step-grid" id="style-step-grid" role="group" aria-label="בחירת סגנון איור"></div>
    </div>

    <!-- ── Step 6 — Voice + sleep mode ─────────────────────── -->
    <div class="step step--voice" id="step-6">
      <p class="step-microcopy" id="voiceMicro"></p>
      <h2 class="step-title" id="voiceTitle"></h2>
      <p class="step-sub" id="voiceSub"></p>
      <div class="voice-step-card">
        <div class="voice-btns" id="voice-btns"></div>
        <div class="sleep-row" onclick="toggleSleep()">
          <div class="sleep-info">
            <div class="sleep-name" id="voiceSleepName"></div>
            <div class="sleep-desc" id="voiceSleepDesc"></div>
          </div>
          <div class="sleep-checkbox" id="sleep-toggle"></div>
        </div>
      </div>
    </div>

    <!-- ── Step 7 — Book name + dedication ─────────────────── -->
    <div class="step" id="step-7">
      <p class="step-microcopy" id="bookMicro"></p>
      <h2 class="step-title" id="sBookTitle"></h2>
      <p class="step-sub" id="sBookSub"></p>

      <div class="form-group" style="margin-bottom: 18px;">
        <label class="form-label" id="sBookNameLabel"></label>
        <input class="form-input" id="bookNameInput" type="text" maxlength="60" autocomplete="off" dir="rtl" />
        <div class="form-hint" id="sBookNameHint"></div>
      </div>

      <h3 class="step-section-label">
        <span id="dedicationHeading"></span>
        <span class="optional-badge" id="dedicationOptionalBadge"></span>
      </h3>
      <p class="step-hint" id="dedicationHint"></p>
      <textarea class="wiz-textarea" id="dedicationInput" maxlength="300" rows="5"></textarea>
      <div class="char-count"><span id="dedicationCount">0</span>/300</div>
    </div>

    <!-- ── Step 8 — Product cards ───────────────────────────── -->
    <div class="step" id="step-8">
      <p class="step-microcopy" id="productMicro"></p>
      <h2 class="step-title" id="productTitle"></h2>
      <p class="step-sub" id="productSub"></p>
      <div class="product-step-grid" id="product-cards" role="group" aria-label="בחירת מוצר"></div>
      <span id="total-price" hidden></span>
    </div>

    <!-- ── Step 9 — Summary + Payment ─────────────────────── -->
    <div class="step" id="step-9">
      <p class="step-microcopy" id="summaryMicro"></p>
      <header class="s9-hero">
        <div class="s9-hero-sparkle" aria-hidden="true">✨</div>
        <h2 class="step-title s9-hero-title" id="s9Title"></h2>
        <p class="step-sub s9-hero-sub" id="s9Sub"></p>
      </header>

      <div class="s9-grid s9-grid--balanced">
        <div class="s9-card s9-card--summary">
          <div id="summary-book-panel"></div>
          <div class="s9-summary-divider" aria-hidden="true"></div>
          <div id="order-summary"></div>
          <div class="s9-summary-divider" aria-hidden="true"></div>
          <div id="price-breakdown"></div>
        </div>

        <div class="s9-card s9-card--checkout">
          <div class="contact-form">
            <div class="form-group">
              <label class="form-label" id="s9NameLabel"></label>
              <input class="form-input" id="contact-name" type="text" placeholder="" autocomplete="name" />
            </div>
            <div class="form-group">
              <label class="form-label" id="s9EmailLabel"></label>
              <input class="form-input" id="contact-email" type="email" placeholder="" autocomplete="email" />
            </div>
            <button class="contact-btn" id="btn-pay" onclick="goNext()"></button>
            <div class="payment-logos" id="s9PaymentLogos"></div>
          </div>
        </div>
      </div>
      <button type="button" class="s9-back-btn" onclick="goBack()">
        <span class="s9-back-arrow">&#8594;</span> חזרה לעריכה
      </button>
    </div>

  </main>

  <div class="bottom-bar" id="bottom-bar">
    <div class="bottom-bar-actions" id="bottom-bar-actions">
      <div class="bottom-bar-total" id="bottom-bar-total" hidden>
        <span class="bottom-bar-total-label" id="bottomBarTotalLabel"></span>
        <span class="bottom-bar-total-price" id="bottom-bar-price">₪59</span>
      </div>
      <button type="button" id="btn-continue" class="btn-continue"></button>
      <button type="button" id="btn-continue-anyway" class="btn-continue btn-continue--anyway" hidden>להמשיך בלי התמונה הזו</button>
      <button type="button" id="btn-back"     class="btn-back"     onclick="goBack()"></button>
    </div>
  </div>

  <script src="/JS/content.js?v=wizard-9step-v1"></script>
  <script src="/JS/canonical-topics.js"></script>
  <script src="/JS/routes.js"></script>
  <script src="/JS/companions.js"></script>
  <script src="/JS/analytics.js"></script>
  <script src="/JS/client-api.js"></script>
  <script src="/JS/child-photo-client.js"></script>
  <script src="/JS/wizard.js?v=wizard-mobile-cleanup-v1"></script>
</body>

</html>
